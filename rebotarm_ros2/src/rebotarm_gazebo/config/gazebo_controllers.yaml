controller_manager:
  ros__parameters:
    update_rate: 200
    use_sim_time: true

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    rebotarm_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    gripper_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    gazebo_rebotarm_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    gazebo_gripper_controller:
      type: joint_trajectory_controller/JointTrajectoryController


joint_state_broadcaster:
  ros__parameters:
    use_sim_time: true

rebotarm_controller:
  ros__parameters:
    use_sim_time: true
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    joints:
      - joint1
      - joint2
      - joint3
      - joint4
      - joint5
      - joint6
    allow_nonzero_velocity_at_trajectory_end: true
    state_publish_rate: 50.0
    action_monitor_rate: 20.0

gripper_controller:
  ros__parameters:
    use_sim_time: true
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    joints:
      - gripper_joint1
      - gripper_joint2
    allow_nonzero_velocity_at_trajectory_end: true
    state_publish_rate: 50.0
    action_monitor_rate: 20.0
    constraints:
      stopped_velocity_tolerance: 0.01
      goal_time: 1.0
      gripper_joint1: {goal: 0.005}
      gripper_joint2: {goal: 0.005}

gazebo_rebotarm_controller:
  ros__parameters:
    use_sim_time: true
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    joints:
      - joint1
      - joint2
      - joint3
      - joint4
      - joint5
      - joint6
    allow_nonzero_velocity_at_trajectory_end: true
    state_publish_rate: 50.0
    action_monitor_rate: 20.0

gazebo_gripper_controller:
  ros__parameters:
    use_sim_time: true
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    joints:
      - gripper_joint1
      - gripper_joint2
    allow_nonzero_velocity_at_trajectory_end: true
    state_publish_rate: 50.0
    action_monitor_rate: 20.0
