# reBotArm RS 配置文件（RobStride 电机 + CAN 总线）
# vendor: robstride  |  transport: CAN
# 关节分组: arm (前6关节) + gripper (夹爪，可选)
# 夹爪说明:
#   - 使用电机夹爪时: 取消注释 gripper 组，arm 组指定6个关节
#   - 使用其他执行器(吸盘等)时: 注释掉 gripper 组，arm 组改为6个关节
#   - arm.gripper 在无配置时自动替换为 NoOpGroup，所有操作均为空操作

# 运动学配置（URDF 路径、末端执行器帧）


# reBotArm RS config (RobStride motors + CAN bus)
# vendor: robstride  |  transport: CAN
# Joint groups: arm (first 6 joints) + gripper (optional)
# Gripper notes:
#   - Using motor gripper: uncomment gripper group, arm group lists 6 joints
#   - Using other actuator (suction cup, etc.): comment out gripper group
#   - arm.gripper auto-replaces with NoOpGroup when unconfigured; all operations are no-op

# Kinematics config (URDF path, end-effector frame)

urdf_path: "urdf/00-arm-rs_asm-v3/urdf/00-arm-rs_asm-v3.urdf"
end_effector_frame: "gripper_end"

channel: can0
rate: 500

groups:
  arm:
    joints: [joint1, joint2, joint3, joint4, joint5, joint6]
  gripper:
    joints: [gripper]

joints:
  - name: joint1
    motor_id: 0x01
    feedback_id: 0xFD
    model: "rs-06"
    vendor: "robstride"
    MIT:
      kp: 50.0
      kd: 3.0
    POS_VEL:
      vel_kp: 12.0
      vel_ki: 0.1
      pos_kp: 13.0
      vlim: 10.0

  - name: joint2
    motor_id: 0x02
    feedback_id: 0xFD
    model: "rs-06"
    vendor: "robstride"
    MIT:
      kp: 150.0
      kd: 10.0
    POS_VEL:
      vel_kp: 14.0
      vel_ki: 0.1
      pos_kp: 16.0
      vlim: 10.0

  - name: joint3
    motor_id: 0x03
    feedback_id: 0xFD
    model: "rs-06"
    vendor: "robstride"
    MIT:
      kp: 150.0
      kd: 10.0
    POS_VEL:
      vel_kp: 14.0
      vel_ki: 0.1
      pos_kp: 14.0
      vlim: 10.0

  - name: joint4
    motor_id: 0x04
    feedback_id: 0xFD
    model: "rs-00"
    vendor: "robstride"
    MIT:
      kp: 50.0
      kd: 5.0
    POS_VEL:
      vel_kp: 5.0
      vel_ki: 0.1
      pos_kp: 20.0
      vlim: 10.0

  - name: joint5
    motor_id: 0x05
    feedback_id: 0xFD
    model: "rs-00"
    vendor: "robstride"
    MIT:
      kp: 50.0
      kd: 4.0
    POS_VEL:
      vel_kp: 4.0
      vel_ki: 0.1
      pos_kp: 10.0
      vlim: 10.0

  - name: joint6
    motor_id: 0x06
    feedback_id: 0xFD
    model: "rs-00"
    vendor: "robstride"
    MIT:
      kp: 50.0
      kd: 4.0
    POS_VEL:
      vel_kp: 4.0
      vel_ki: 0.1
      pos_kp: 10.0
      vlim: 10.0

  - name: gripper
    motor_id: 0x07
    feedback_id: 0xFD
    model: "rs-00"
    vendor: "robstride"
    MIT:
      kp: 50.0
      kd: 4.0
    POS_VEL:
      vel_kp: 4.0
      vel_ki: 0.1
      pos_kp: 10.0
      vlim: 5.0
