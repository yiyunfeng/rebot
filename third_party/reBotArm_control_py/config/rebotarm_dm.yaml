# reBotArm DM 配置文件（Damiao 电机 + 串口桥）
# vendor: damiao  |  transport: dm-serial
# 关节分组: arm (前6关节) + gripper (夹爪)
# 每组独立控制模式，独立发送
# 运动学配置（URDF 路径、末端执行器帧）

# reBotArm DM config (Damiao motors + serial bridge)
# vendor: damiao  |  transport: dm-serial
# Joint groups: arm (first 6 joints) + gripper
# Each group has its own control mode and is sent independently
# Kinematics config (URDF path, end-effector frame)

urdf_path: "urdf/reBot-DevArm_fixend_description/urdf/reBot-DevArm_fixend.urdf"
end_effector_frame: "end_link"

channel: /dev/ttyACM0
rate: 500

groups:
  arm:
    joints: [joint1, joint2, joint3, joint4, joint5, joint6]
  gripper:
    joints: [gripper]

joints:
  - name: joint1
    motor_id: 0x01
    feedback_id: 0x11
    model: "4340P"
    vendor: "damiao"
    MIT:
      kp: 120.0
      kd: 8.0
    POS_VEL:
      vel_kp: 0.0125
      vel_ki: 0.004
      pos_kp: 150.0
      pos_ki: 0.5
      vlim: 5.0

  - name: joint2
    motor_id: 0x02
    feedback_id: 0x12
    model: "4340P"
    vendor: "damiao"
    MIT:
      kp: 120.0
      kd: 8.0
    POS_VEL:
      vel_kp: 0.0125
      vel_ki: 0.004
      pos_kp: 150.0
      pos_ki: 0.5
      vlim: 5.0

  - name: joint3
