      - opencv-python==4.7.0.72
      - opencv-contrib-python==4.7.0.72
      - ultralytics==8.4.35
      - pyrealsense2>=2.54
      - meshcat>=0.3.2
      - motorbridge>=0.1.7
      - funasr==1.1.3
      - modelscope
      - torchaudio
      - soundfile
